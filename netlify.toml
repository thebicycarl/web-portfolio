[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_RSVP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOsWf0ruiCvJqvbfZZBbfxYsoN5c5gL-x1r9s7dYaN_eRvfo6oeDVfbStrrZvdA2w/exec"

# SPA redirect - handles all routes for simple projects in monorepo
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Example: If you want to host a complex project in a separate repo,
# uncomment and modify the redirect below to proxy to that project:
# [[redirects]]
#   from = "/chess/*"
#   to = "https://chess-app.netlify.app/:splat"
#   status = 200
#   force = true

